name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-linux
            runner: ubuntu-24.04
            legacy_suffix: linux-amd64
          - name: aarch64-linux
            runner: ubuntu-22.04-arm
            legacy_suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools cmake

      - name: Build (static musl)
        run: make

      - name: Verify binaries
        run: |
          file build/erlkoenig_rt | grep -q "statically linked"
          file build/ek_rtctl | grep -q "statically linked"
          file build/gateway | grep -q "statically linked"
          ls -lh build/erlkoenig_rt build/ek_rtctl build/gateway

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target.name }}"
          LEGACY_SUFFIX="${{ matrix.target.legacy_suffix }}"
          mkdir -p dist-out

          # Main binaries
          cp build/erlkoenig_rt dist-out/
          cp build/ek_rtctl dist-out/

          # Gateway demo
          cp build/gateway dist-out/

          # systemd + install
          cp -r dist/systemd dist-out/
          cp scripts/install.sh dist-out/

          # Canonical tarball name matches the erlkoenig release target scheme.
          tar czf "erlkoenig_rt-${VERSION}-${TARGET}.tar.gz" -C dist-out .

          # Compatibility tarball for older installers that use linux-amd64 /
          # linux-arm64 target names.
          cp "erlkoenig_rt-${VERSION}-${TARGET}.tar.gz" \
             "erlkoenig_rt-${VERSION}-${LEGACY_SUFFIX}.tar.gz"

          # Standalone binaries for quick download and installer fallback.
          cp build/erlkoenig_rt "erlkoenig_rt-${LEGACY_SUFFIX}"
          cp build/ek_rtctl "ek_rtctl-${LEGACY_SUFFIX}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: |
            erlkoenig_rt-*.tar.gz
            erlkoenig_rt-${{ matrix.target.legacy_suffix }}
            ek_rtctl-${{ matrix.target.legacy_suffix }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/erlkoenig_rt-*.tar.gz
            artifacts/erlkoenig_rt-linux-*
            artifacts/ek_rtctl-linux-*
