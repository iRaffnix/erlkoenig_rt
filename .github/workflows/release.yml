name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools cmake

      - name: Build (static musl)
        run: make

      - name: Verify binaries
        run: |
          file build/erlkoenig_rt | grep -q "statically linked"
          file build/ek_rtctl | grep -q "statically linked"
          file build/gateway | grep -q "statically linked"
          ls -lh build/erlkoenig_rt build/ek_rtctl build/gateway

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist-out

          # Main binaries
          cp build/erlkoenig_rt dist-out/
          cp build/ek_rtctl dist-out/

          # Gateway demo
          cp build/gateway dist-out/

          # systemd + install
          cp -r dist/systemd dist-out/
          cp scripts/install.sh dist-out/

          # Tarball
          tar czf erlkoenig_rt-${VERSION}-linux-amd64.tar.gz -C dist-out .

          # Standalone binaries for quick download
          cp build/erlkoenig_rt erlkoenig_rt-linux-amd64
          cp build/ek_rtctl ek_rtctl-linux-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: |
            erlkoenig_rt-*.tar.gz
            erlkoenig_rt-linux-amd64
            ek_rtctl-linux-amd64

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/erlkoenig_rt-*.tar.gz
            artifacts/erlkoenig_rt-linux-amd64
            artifacts/ek_rtctl-linux-amd64
